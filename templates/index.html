<!DOCTYPE html>
<html>
<head>
    <title>Career Recommender</title>
    <style>
        body { font-family: Arial; padding: 20px; background-color: #f2f2f2; }
        form { background: white; padding: 20px; max-width: 400px; margin: auto; border-radius: 10px; box-shadow: 0 0 10px #ccc; }
        h2 { text-align: center; }
        input, select { width: 100%; padding: 10px; margin-top: 10px; }
        button { padding: 10px; width: 100%; margin-top: 20px; }
        .result { text-align: center; font-size: 20px; color: green; margin-top: 20px; }
        .error { text-align: center; font-size: 18px; color: red; margin-top: 20px; }
    </style>
</head>
<body>

    <form method="POST">
        <h2>Career Recommender 💼</h2>
        <label>GPA:</label>
        <input type="number" step="0.1" name="gpa" required>

        <label>Skill:</label>
        <input type="text" name="skill" required placeholder="e.g. Python">

        <label>Interest:</label>
        <input type="text" name="interest" required placeholder="e.g. Data">

        <button type="submit">Get Recommendation</button>

        {% if prediction %}
            <div class="result">✅ Recommended Career: <strong>{{ prediction }}</strong></div>
        {% endif %}

        {% if error %}
            <div class="error">⚠️ {{ error }}</div>
        {% endif %}
    </form>

</body>
</html>
